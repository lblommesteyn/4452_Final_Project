experiment:
  name: resnet18_real_castles_gzh
  output_dir: outputs/resnet18_real_castles_gzh
  seed: 42

data:
  manifest_path: data/real_castles_gzh/manifest.csv
  image_size: 128
  batch_size: 8
  num_workers: 0
  train_split: train
  val_split: val
  test_split: test
  use_weighted_sampler: true

model:
  name: resnet18
  image_size: 128
  pretrained: true
  dropout: 0.2
  freeze_backbone: false

training:
  epochs: 6
  learning_rate: 0.0001
  weight_decay: 0.0001
  positive_class_weight: 1.0
  focal_gamma: 1.5
  patience: 3
  device: auto
  mixed_precision: false
  calibration: true
  decision_threshold: 0.5

